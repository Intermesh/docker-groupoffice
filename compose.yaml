services:
  groupoffice:
    image: intermesh/groupoffice:26.0
    restart: always
    ports:
      - "9090:80"
    links:
      - db
    volumes:
      - "godata:/var/lib/groupoffice:cached"
      - "goetc:/etc/groupoffice:cached"
      # Instead you could use bind mounts:
      #- "./data/etc:/etc/groupoffice:cached"
      #- "./data/groupoffice:/var/lib/groupoffice:cached"
      # Example for ssl
      #- "./config/ssl/groupoffice:/etc/ssl/groupoffice"

    env_file:
      - ./db.env     
  db:
    image: mariadb:11.1.2
    restart: always    
    env_file:
      - ./db.env
    environment:
      MYSQL_ROOT_PASSWORD: groupoffice
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - "dbdata:/var/lib/mysql:cached"

volumes:
  godata:
  goetc:
  #gostudio:
  dbdata:
